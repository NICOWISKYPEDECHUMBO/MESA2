  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

SANGUE OCULTO PESQUISA NAS FEZES\": 11.89,\n      \"TRIGLICERÍDEOS - PESQUISA E/OU DOSAGEM\": 9.56,\n      \"HEPATITE B - HBSAG (AU ANTÍGENO AUSTRÁLIA) - PESQUISA E/OU DOSAGEM\": 19.07,\n      \"COLESTEROL TOTAL - PESQUISA E/OU DOSAGEM\": 7.74,\n      \"ANTÍGENO ESPECÍFICO PROSTÁTICO TOTAL (PSA) - PESQUISA E/OU DOSAGEM\": 34.63,\n      \"HEPATITE B - HBSAC (ANTI-ANTÍGENO DE SUPERFÍCIE) - PESQUISA E/OU DOSAGEM\": 23.78,\n      \"HEPATITE C - ANTI-HCV - PESQUISA E/OU DOSAGEM\": 45.08,\n      \"TRANSAMINASE PIRÚVICA (AMINO TRANSFERASE DE ALANINA) - PESQUISA E/OU DOSAGEM\": 9.94,\n      \"ROTINA DE URINA (CARACTERES FÍSICOS ELEMENTOS ANORMAIS E SEDIMENTOSCOPIA)\": 10.54,\n      \"CREATININA - PESQUISA E/OU DOSAGEM\": 7.74,\n      \"HEMOGRAMA COM CONTAGEM DE PLAQUETAS OU FRAÇÕES (ERITROGRAMA LEUCOGRAMA PLAQUETAS)\": 10.93,\n      \"CLÍNICO\": 80.00,\n      \"FOSFATASE ALCALINA - PESQUISA E/OU DOSAGEM\": 11.44,\n      \"PROTEÍNAS TOTAIS - PESQUISA E/OU DOSAGEM\": 7.00,\n      \"GAMA-GLUTAMIL TRANSFERASE - PESQUISA E/OU DOSAGEM\": 3.53,\n      \"BILIRRUBINAS (DIRETA, INDIRETA E TOTAL) - PESQUISA E/OU DOSAGEM\": 2.18,\n      \"COLINESTERASE (PARA CARBAMATOS ORGANOFOSFORADOS) - PESQUISA E/OU DOSAGEM\": 3.65,\n      \"ACETILCOLINESTERASE, EM ERITRÓCITOS - PESQUISA E/OU DOSAGEM\": 14.25,\n      \"GLICOSE\": 7.74, \"GLICOSE - PESQUISA E/OU DOSAGEM\": 7.74\n    };\n    this.defaultCnem = {\n      \"AVALIAÇÃO GINECOLÓGICA\": 93.86,\n      \"OFTALMOLÓGICO (ACUIDADE VISUAL)\": 93.86,\n      \"HEPATITE B - HBCAC - IGM (ANTI-CORE IGM OU ACOREM) - PESQUISA E/OU DOSAGEM\": 45.38,\n      \"PROTEÍNAS TOTAIS - PESQUISA E/OU DOSAGEM\": 6.66,\n      \"ACETILCOLINESTERASE, EM ERITRÓCITOS - PESQUISA E/OU DOSAGEM\": 14.25,\n      \"HEPATITE B - HBCAC - IGG (ANTI-CORE IGM OU ACOREM) - PESQUISA E/OU DOSAGEM\": 37.26,\n      \"FOSFATASE ALCALINA - PESQUISA E/OU DOSAGEM\": 16.02,\n      \"GAMA-GLUTAMIL TRANSFERASE - PESQUISA E/OU DOSAGEM\": 3.53,\n      \"BILIRRUBINAS (DIRETA, INDIRETA E TOTAL) - PESQUISA E/OU DOSAGEM\": 2.18,\n      \"COLINESTERASE (PARA CARBAMATOS ORGANOFOSFORADOS) - PESQUISA E/OU DOSAGEM\": 3.65,\n      \"MAMOGRAFIA DIGITAL BILATERAL\": 123.10,\n      \"GLICOSE\": 7.51, \"GLICOSE - PESQUISA E/OU DOSAGEM\": 7.51\n    };\n    this.state = {\n      modal: null,\n      tickets: [],\n      geap: { ...this.defaultGeap },\n      cnem: { ...this.defaultCnem },\n      procedures: [],\n      metadata: {},\n      hasProcedures: false,\n      summary: null,\n      animTotal: 0\n    };\n    this.KEY_T = \"mesaGuias.tickets.v1\";\n    this.KEY_G = \"mesaGuias.geap.v1\";\n    this.KEY_C = \"mesaGuias.cnem.v1\";\n    this.guideRef = React.createRef();\n    this.processRef = React.createRef();\n    this.remessaRef = React.createRef();\n    this.nomeRef = React.createRef();\n    this.valorRef = React.createRef();\n    this.fonteRef = React.createRef();\n    this.importRef = React.createRef();\n  }\n\n  componentDidMount() {\n    try {\n      const t = localStorage.getItem(this.KEY_T);\n      const g = localStorage.getItem(this.KEY_G);\n      const c = localStorage.getItem(this.KEY_C);\n      const next = {};\n      if (t) { const p = JSON.parse(t); if (Array.isArray(p)) next.tickets = p; }\n      if (g) { const p = JSON.parse(g); if (p && typeof p === \"object\") next.geap = p; }\n      if (c) { const p = JSON.parse(c); if (p && typeof p === \"object\") next.cnem = p; }\n      if (Object.keys(next).length) this.setState(next);\n      const tk = next.tickets || this.state.tickets;\n      const tot = tk.reduce((a, t) => a + (t.total || 0), 0);\n      this.setState({ animTotal: tot });\n    } catch (e) { console.warn(\"load falhou\", e); }\n  }\n\n  tweenDisplay(target) {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    const start = this.state.animTotal || 0;\n    if (Math.abs(target - start) < 0.005) { this.setState({ animTotal: target }); return; }\n    const t0 = (typeof performance !== \"undefined\" ? performance.now() : Date.now());\n    const dur = 550;\n    const step = (now) => {\n      const p = Math.min(1, (now - t0) / dur);\n      const ease = 1 - Math.pow(1 - p, 3);\n      this.setState({ animTotal: start + (target - start) * ease });\n      if (p < 1) this._raf = requestAnimationFrame(step);\n      else this.setState({ animTotal: target });\n    };\n    this._raf = requestAnimationFrame(step);\n  }\n\n  recalcDisplay(tickets) {\n    const tk = tickets || this.state.tickets;\n    const total = tk.reduce((a, t) => a + (t.total || 0), 0);\n    this.tweenDisplay(total);\n  }\n\n  persist(over) {\n    const s = { ...this.state, ...(over || {}) };\n    try {\n      localStorage.setItem(this.KEY_T, JSON.stringify(s.tickets));\n      localStorage.setItem(this.KEY_G, JSON.stringify(s.geap));\n      localStorage.setItem(this.KEY_C, JSON.stringify(s.cnem));\n    } catch (e) { console.warn(\"persist falhou\", e); }\n  }\n\n  // ---------- valores ----------\n  getExamValue(desc) {\n    const normalize = (str) => str.toUpperCase().normalize(\"NFD\")\n      .replace(/[\\u0300-\\u036f]/g, \"\").replace(/[(),.;:\\-]/g, \" \")\n      .replace(/\\s+/g, \" \").trim();\n    const normDesc = normalize(desc || \"\");\n    for (const k in this.state.geap) {\n      const nk = normalize(k);\n      if (normDesc === nk || normDesc.startsWith(nk)) return this.state.geap[k];\n    }\n    for (const k in this.state.cnem) {\n      const nk = normalize(k);\n      if (normDesc === nk || normDesc.startsWith(nk)) return this.state.cnem[k];\n    }\n    return 0;\n  }\n  consultationOptions() {\n    return {\n      \"AVALIAÇÃO GINECOLÓGICA\": this.getExamValue(\"AVALIAÇÃO GINECOLÓGICA\"),\n      \"CLÍNICO\": this.getExamValue(\"CLÍNICO\"),\n      \"OFTALMOLÓGICO (ACUIDADE VISUAL)\": this.getExamValue(\"OFTALMOLÓGICO (ACUIDADE VISUAL)\"),\n      \"PAPANICOLAU\": this.getExamValue(\"PAPANICOLAU\")\n    };\n  }\n\n  // ---------- parsing ----------\n  parseGuide(text) {\n    const lines = text.split(/\\n+/);\n    const procedures = [];\n    let inProcedures = false;\n    let guia = \"\", beneficiario = \"\", remessa = \"\", situacaoGuia = \"\";\n    let dataEmissao = \"\", guiaSiass = \"\", registroAns = \"\", numeroGuiaPrestador = \"\";\n    let lote = \"\", documento = \"\", sexo = \"\", dataNascimento = \"\", cpf = \"\", rg = \"\";\n    for (let i = 0; i < lines.length; i++) {\n      const line = lines[i];\n      if (!guia && (/N[ºo°]?\\s*Guia\\s*Operadora/i.test(line) || /Número da Guia do Prestador/i.test(line))) {\n        for (let j = i; j < lines.length; j++) { const m = lines[j].match(/\\b\\d{8,10}\\b/); if (m) { guia = m[0]; break; } }\n      }\n      if (!beneficiario && /^13\\s*-\\s*Nome/i.test(line)) {\n        let j = i + 1; while (j < lines.length && !lines[j].trim()) j++;\n        if (j < lines.length) beneficiario = lines[j].trim();\n      }\n      if (!remessa && /Remessa:/i.test(line)) {\n        for (let k = 0; k <= 3; k++) {\n          const cl = lines[i + k] || \"\"; const nums = cl.match(/\\b\\d{5,9}\\b/g);\n          if (nums) { for (const num of nums) { if (num !== guia) { remessa = num; break; } } }\n          if (remessa) break;\n        }\n      }\n      if (!situacaoGuia && /Situação da Guia/i.test(line)) {\n        for (let j = i + 1; j < lines.length; j++) {\n          const sl = lines[j] || \"\"; if (!sl.trim()) continue;\n          if (/Guia Operadora/i.test(sl) || /Número da Guia/i.test(sl)) continue;\n          const idx = sl.search(/Guia/i);\n          if (idx !== -1) { let s = sl.substring(idx).trim(); s = s.replace(/\\bAlterar\\b/i, \"\").trim(); situacaoGuia = s; break; }\n        }\n      }\n      if (!dataEmissao && /Data\\s+de\\s+Emissão/i.test(line)) {\n        for (let j = i; j < Math.min(lines.length, i + 3); j++) { const m = (lines[j] || \"\").match(/\\b\\d{2}\\/\\d{2}\\/\\d{4}\\b/); if (m) { dataEmissao = m[0]; break; } }\n      }\n      if (!guiaSiass && /Guia\\s*SIASS/i.test(line)) {\n        for (let j = i; j < Math.min(lines.length, i + 3); j++) { const m = (lines[j] || \"\").match(/[A-Za-z0-9]{4,}(?:\\.[A-Za-z0-9]{2,})+/); if (m) { guiaSiass = m[0]; break; } }\n      }\n      if (!registroAns && /Registro\\s*ANS/i.test(line)) {\n        let m = line.match(/\\b\\d+\\b/);\n        if (m) registroAns = m[0];\n        else { for (let j = i; j < Math.min(lines.length, i + 3); j++) { const m2 = (lines[j] || \"\").match(/\\b\\d+\\b/); if (m2) { registroAns = m2[0]; break; } } }\n      }\n      if (!numeroGuiaPrestador && /Número\\s+da\\s+Guia\\s+do\\s+Prestador/i.test(line)) {\n        for (let j = i; j < Math.min(lines.length, i + 3); j++) { const m = (lines[j] || \"\").match(/\\b\\d{8,10}\\b/); if (m) { numeroGuiaPrestador = m[0]; break; } }\n      }\n      if (!lote && /Lote:/i.test(line)) {\n        let m = line.match(/Lote:\\s*(\\d+)/i);\n        if (m) lote = m[1];\n        else { const rem = line.split(/Lote:/i).pop() || \"\"; const m2 = rem.match(/\\b\\d+\\b/); if (m2) lote = m2[0]; else { for (let j = i; j < Math.min(lines.length, i + 2); j++) { const m3 = (lines[j] || \"\").match(/\\b\\d+\\b/); if (m3) { lote = m3[0]; break; } } } }\n      }\n      if (!documento && /Documento:/i.test(line)) { const m = line.match(/Documento:\\s*(\\S+)/i); if (m) documento = m[1]; }\n      if (!sexo && /Sexo/i.test(line)) {\n        let pa = line.split(/Sexo\\s*:*/i).pop().trim();\n        if (pa && !/\\d/.test(pa)) { const toks = pa.split(/\\s+/).filter(Boolean); for (const tk of toks) { if (tk !== \"*\" && /[A-Za-zÀ-ÿ]+/.test(tk)) { sexo = tk.trim(); break; } } }\n        if (!sexo) { for (let j = i + 1; j < Math.min(lines.length, i + 3); j++) { const c = lines[j].trim(); if (c && !/\\d/.test(c)) { const t2 = c.split(/\\s+/).filter(Boolean); for (const tk of t2) { if (tk !== \"*\" && /[A-Za-zÀ-ÿ]+/.test(tk)) { sexo = tk.trim(); break; } } if (sexo) break; } } }\n      }\n      if (!dataNascimento && /Data\\s+de\\s+Nascimento/i.test(line)) {\n        for (let j = i; j < Math.min(lines.length, i + 3); j++) { const m = (lines[j] || \"\").match(/\\b\\d{2}\\/\\d{2}\\/\\d{4}\\b/); if (m) { dataNascimento = m[0]; break; } }\n      }\n      if (!cpf && /CPF/i.test(line)) {\n        for (let j = i; j < Math.min(lines.length, i + 3); j++) { const m = (lines[j] || \"\").match(/\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}/); if (m) { cpf = m[0]; break; } }\n      }\n      if (!rg && /\\bRG\\b/i.test(line)) {\n        const m = line.match(/RG\\s*:*(.*)/i);\n        if (m && m[1].trim()) rg = m[1].trim();\n        if (!rg) { for (let j = i + 1; j < Math.min(lines.length, i + 3); j++) { const c = lines[j].trim(); if (c) { rg = c; break; } } }\n      }\n      if (!inProcedures && /PROCEDIMENTO\\(S\\)/i.test(line)) { inProcedures = true; continue; }\n      if (inProcedures) {\n        const rm = line.match(/^\\s*(\\d+)\\s+(\\d+)\\s+(\\S*)\\s+(\\d{2}\\/\\d{2}\\/\\d{4})\\s+(.*?)\\s+(\\d+,\\d+)/);\n        if (rm) {\n          procedures.push({ item: rm[1], code: rm[2], cbo: rm[3] || \"\", dateAtendimento: rm[4], desc: rm[5].trim(), qty: parseFloat(rm[6].replace(\",\", \".\")) });\n        } else {\n          const pm = line.match(/\\d{2}\\/\\d{2}\\/\\d{4}\\s+(.*?)\\s+(\\d+,\\d+)/);\n          if (pm) { const dm = line.match(/\\d{2}\\/\\d{2}\\/\\d{4}/); procedures.push({ item: \"\", code: \"\", cbo: \"\", dateAtendimento: dm ? dm[0] : \"\", desc: pm[1].trim(), qty: parseFloat(pm[2].replace(\",\", \".\")) }); }\n        }\n      }\n    }\n    return { procedures, metadata: { guia, beneficiario, remessa, situacaoGuia, dataEmissao, guiaSiass, registroAns, numeroGuiaPrestador, lote, documento, sexo, dataNascimento, cpf, rg } };\n  }\n\n  parseProcessedRow(line) {\n    const parts = line.trim().split(/\\s+/);\n    let i = 0, guia = \"\";\n    while (i < parts.length) { if (/^\\d{8,}$/.test(parts[i])) { guia = parts[i]; break; } i++; }\n    if (!guia) return null;\n    i++; while (i < parts.length && /^\\d+$/.test(parts[i])) i++;\n    let bp = [];\n    while (i < parts.length && !/^\\d{2}\\/\\d{2}\\/\\d{4}$/.test(parts[i])) { bp.push(parts[i]); i++; }\n    const beneficiario = bp.join(\" \");\n    if (i < parts.length) i++;\n    let remessa = \"\";\n    while (i < parts.length) { if (/^\\d+$/.test(parts[i])) { remessa = parts[i]; i++; break; } i++; }\n    while (i < parts.length && /^\\d+$/.test(parts[i])) i++;\n    let status = parts[parts.length - 1];\n    if (parts.length >= 2 && parts[parts.length - 2].toLowerCase() === \"em\") status = parts[parts.length - 2] + \" \" + parts[parts.length - 1];\n    return { guia, beneficiario, remessa, status };\n  }\n\n  // ---------- actions ----------\n  analyze() {\n    const text = (this.guideRef.current && this.guideRef.current.value) || \"\";\n    if (!text.trim()) { alert(\"Cole a guia antes de analisar.\"); return; }\n    const { procedures, metadata } = this.parseGuide(text);\n    if (!procedures.length) { alert(\"Nenhum procedimento encontrado. Verifique se colou a guia completa.\"); return; }\n    const co = this.consultationOptions();\n    const firstOpt = Object.keys(co)[0];\n    const procs = procedures.map(p => ({ ...p, isConsulta: /CONSULTA EM CONSULTÓRIO/i.test(p.desc), selected: firstOpt }));\n    this.setState({ procedures: procs, metadata, hasProcedures: true });\n  }\n\n  setProcSel(idx, val) {\n    const procs = this.state.procedures.map((p, i) => i === idx ? { ...p, selected: val } : p);\n    this.setState({ procedures: procs });\n  }\n\n  addTicket() {\n    const co = this.consultationOptions();\n    let total = 0;\n    this.state.procedures.forEach(p => {\n      if (p.isConsulta) total += (co[p.selected] || 0) * p.qty;\n      else total += this.getExamValue(p.desc) * p.qty;\n    });\n    const m = this.state.metadata;\n    const ticket = {\n      guia: m.guia || \"\", beneficiario: m.beneficiario || \"\", remessa: \"\",\n      situacaoGuia: m.situacaoGuia || \"\", registroAns: m.registroAns || \"\",\n      numeroGuiaPrestador: m.numeroGuiaPrestador || \"\", dataEmissao: m.dataEmissao || \"\",\n      guiaSiass: m.guiaSiass || \"\", sexo: m.sexo || \"\", dataNascimento: m.dataNascimento || \"\",\n      cpf: m.cpf || \"\", rg: m.rg || \"\", lote: m.lote || \"\", documento: m.documento || \"\",\n      procedures: this.state.procedures.map(p => ({ item: p.item, code: p.code, cbo: p.cbo, dateAtendimento: p.dateAtendimento, desc: p.desc, qty: p.qty })),\n      total: parseFloat(total.toFixed(2)), status: \"\"\n    };\n    const tickets = [...this.state.tickets, ticket];\n    this.persist({ tickets });\n    if (this.guideRef.current) this.guideRef.current.value = \"\";\n    this.setState({ tickets, procedures: [], metadata: {}, hasProcedures: false });\n    this.recalcDisplay(tickets);\n  }\n\n  editTicket(idx) {\n    const t = { ...this.state.tickets[idx] };\n    const fields = [[\"guia\",\"Guia\"],[\"beneficiario\",\"Beneficiário\"],[\"remessa\",\"Remessa\"],[\"situacaoGuia\",\"Situação da Guia\"],[\"registroAns\",\"Registro ANS\"],[\"numeroGuiaPrestador\",\"Nº Guia Prestador\"],[\"dataEmissao\",\"Data Emissão\"],[\"guiaSiass\",\"Guia SIASS\"],[\"lote\",\"Lote\"],[\"documento\",\"Documento\"],[\"sexo\",\"Sexo\"],[\"dataNascimento\",\"Data de Nascimento\"],[\"cpf\",\"CPF\"],[\"rg\",\"RG\"]];\n    fields.forEach(([k, lbl]) => { const nv = prompt(\"Novo \" + lbl + \":\", t[k] || \"\"); if (nv !== null) t[k] = nv; });\n    const nvVal = prompt(\"Novo valor (R$):\", t.total.toFixed(2));\n    if (nvVal !== null) { const p = parseFloat(nvVal.replace(\",\", \".\")); if (!isNaN(p)) t.total = p; }\n    const tickets = this.state.tickets.map((x, i) => i === idx ? t : x);\n    this.persist({ tickets });\n    this.setState({ tickets });\n    this.recalcDisplay(tickets);\n  }\n\n  deleteTicket(idx) {\n    const tickets = this.state.tickets.filter((_, i) => i !== idx);\n    this.persist({ tickets });\n    this.setState({ tickets });\n    this.recalcDisplay(tickets);\n  }\n\n  applyRemessa() {\n    const num = (this.remessaRef.current && this.remessaRef.current.value || \"\").trim();\n    if (!num) { alert(\"Digite um número de remessa válido.\"); return; }\n    const tickets = this.state.tickets.map(t => ({ ...t, remessa: num }));\n    this.persist({ tickets });\n    this.setState({ tickets });\n  }\n\n  resetTickets() {\n    if (!confirm(\"Limpar TODOS os mini-tickets?\")) return;\n    this.persist({ tickets: [] });\n    this.setState({ tickets: [], summary: null });\n    this.tweenDisplay(0);\n  }\n\n  processSummary() {\n    const text = (this.processRef.current && this.processRef.current.value) || \"\";\n    if (!text.trim()) { alert(\"Cole a colagem 12 antes de processar.\"); return; }\n    const lines = text.trim().split(/\\n+/);\n    const tickets = this.state.tickets.map(t => ({ ...t }));\n    lines.forEach(line => {\n      const parsed = this.parseProcessedRow(line);\n      if (!parsed) return;\n      tickets.forEach(t => {\n        if (t.guia === parsed.guia && (t.beneficiario || \"\").toUpperCase() === parsed.beneficiario.toUpperCase() && t.remessa === parsed.remessa) t.status = parsed.status;\n      });\n    });\n    const totals = { pago: 0, emAuditoria: 0, cancelada: 0, outros: 0, total: 0 };\n    tickets.forEach(t => {\n      totals.total += t.total;\n      const st = (t.status || \"\").toLowerCase();\n      if (st.includes(\"pago\")) totals.pago += t.total;\n      else if (st.includes(\"auditoria\")) totals.emAuditoria += t.total;\n      else if ((t.situacaoGuia || \"\").toLowerCase().includes(\"cancelada\")) totals.cancelada += t.total;\n      else if (st) totals.outros += t.total;\n    });\n    this.persist({ tickets });\n    this.setState({ tickets, summary: totals });\n  }\n\n  addExame() {\n    const nome = (this.nomeRef.current && this.nomeRef.current.value || \"\").trim().toUpperCase();\n    const valor = parseFloat((this.valorRef.current && this.valorRef.current.value || \"\").replace(\",\", \".\"));\n    const fonte = (this.fonteRef.current && this.fonteRef.current.value) || \"GEAP\";\n    if (!nome) { alert(\"Insira o nome do exame.\"); return; }\n    if (isNaN(valor) || valor <= 0) { alert(\"Insira um valor válido.\"); return; }\n    const geap = { ...this.state.geap }, cnem = { ...this.state.cnem };\n    if (fonte === \"GEAP\") geap[nome] = valor; else cnem[nome] = valor;\n    if (this.nomeRef.current) this.nomeRef.current.value = \"\";\n    if (this.valorRef.current) this.valorRef.current.value = \"\";\n    this.persist({ geap, cnem });\n    this.setState({ geap, cnem });\n  }\n\n  removeExame(nome, fonte) {\n    if (!confirm('Remover \"' + nome + '\" da tabela ' + fonte + \"?\")) return;\n    const geap = { ...this.state.geap }, cnem = { ...this.state.cnem };\n    if (fonte === \"GEAP\") delete geap[nome]; else delete cnem[nome];\n    this.persist({ geap, cnem });\n    this.setState({ geap, cnem });\n  }\n\n  // ---------- exports ----------\n  ticketDetailStr(t, sep) {\n    const parts = [];\n    if (t.numeroGuiaPrestador) parts.push(\"Nº Guia do Prestador: \" + t.numeroGuiaPrestador);\n    if (t.registroAns) parts.push(\"Registro ANS: \" + t.registroAns);\n    if (t.dataEmissao) parts.push(\"Data Emissão: \" + t.dataEmissao);\n    if (t.guiaSiass) parts.push(\"Guia SIASS: \" + t.guiaSiass);\n    if (t.lote) parts.push(\"Lote: \" + t.lote);\n    if (t.documento) parts.push(\"Documento: \" + t.documento);\n    if (t.sexo) parts.push(\"Sexo: \" + t.sexo);\n    if (t.dataNascimento) parts.push(\"Data Nasc.: \" + t.dataNascimento);\n    if (t.cpf) parts.push(\"CPF: \" + t.cpf);\n    if (t.rg) parts.push(\"RG: \" + t.rg);\n    if (Array.isArray(t.procedures) && t.procedures.length) {\n      const procs = t.procedures.map(p => {\n        const pp = [];\n        if (p.item) pp.push(\"Item \" + p.item);\n        if (p.code) pp.push(\"Código: \" + p.code);\n        if (p.cbo) pp.push(\"CBO: \" + p.cbo);\n        if (p.dateAtendimento) pp.push(\"Data: \" + p.dateAtendimento);\n        if (p.desc) pp.push(\"Desc: \" + p.desc);\n        if (p.qty !== undefined) pp.push(\"Qtd: \" + p.qty);\n        return pp.join(\" / \");\n      });\n      parts.push(\"Procedimentos: \" + procs.join(\" || \"));\n    }\n    return parts.join(sep);\n  }\n  download(name, content, type) {\n    const blob = new Blob([content], { type });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url; a.download = name; document.body.appendChild(a); a.click();\n    document.body.removeChild(a); URL.revokeObjectURL(url);\n  }\n  exportCsv() {\n    const tickets = this.state.tickets;\n    if (!tickets.length) { alert(\"Nenhum mini-ticket para exportar.\"); return; }\n    const rows = [[\"Identidade\",\"Guia\",\"Beneficiário\",\"Remessa\",\"Situação da Guia\",\"Detalhes\",\"Valor (R$)\",\"Status (após processamento)\"].join(\";\")];\n    tickets.forEach(t => rows.push([this.getGenderEmoji(t.sexo), t.guia||\"\", t.beneficiario||\"\", t.remessa||\"\", t.situacaoGuia||\"\", this.ticketDetailStr(t,\" | \"), t.total.toFixed(2), t.status||\"\"].join(\";\")));\n    const tot = tickets.reduce((a, t) => a + t.total, 0);\n    rows.push([\"\",\"TOTAL\",\"\",\"\",\"\",\"\",tot.toFixed(2),\"\"].join(\";\"));\n    this.download(\"mini_tickets.csv\", rows.join(\"\\n\"), \"text/csv;charset=utf-8;\");\n  }\n  exportPdf() {\n    const tickets = this.state.tickets;\n    if (!tickets.length) { alert(\"Nenhum mini-ticket para exportar.\"); return; }\n    const esc = (s) => String(s == null ? \"\" : s).replace(/&/g, \"&amp;\").replace(/<\u002Fg, \"&lt;\").replace(/>/g, \"&gt;\");\n    const tot = tickets.reduce((a, t) => a + t.total, 0);\n    let body = '<h3>Mini-tickets gerados<\u002Fh3><table><thead><tr><th>Identidade<\u002Fth><th>Guia<\u002Fth><th>Beneficiário<\u002Fth><th>Remessa<\u002Fth><th>Situação da Guia<\u002Fth><th>Detalhes<\u002Fth><th>Valor (R$)<\u002Fth><th>Status (após processamento)<\u002Fth><\u002Ftr><\u002Fthead><tbody>';\n    tickets.forEach(t => { body += \"<tr><td style='font-size:16px;text-align:center;'>\"+esc(this.getGenderEmoji(t.sexo))+\"<\u002Ftd><td>\"+esc(t.guia)+\"<\u002Ftd><td>\"+esc(t.beneficiario)+\"<\u002Ftd><td>\"+esc(t.remessa)+\"<\u002Ftd><td>\"+esc(t.situacaoGuia)+\"<\u002Ftd><td>\"+this.ticketDetailStr(t,\"<br>\")+\"<\u002Ftd><td>\"+t.total.toFixed(2)+\"<\u002Ftd><td>\"+esc(t.status)+\"<\u002Ftd><\u002Ftr>\"; });\n    body += \"<\u002Ftbody><\u002Ftable><p><strong>Total geral:<\u002Fstrong> R$ \"+tot.toFixed(2)+\"<\u002Fp>\";\n    const win = window.open(\"\", \"\", \"width=900,height=700\");\n    if (!win) { alert(\"Não foi possível abrir a janela de impressão. Ative os pop-ups do navegador.\"); return; }\n    win.document.write(\"<html><head><meta charset='utf-8'><title>Mini-tickets<\u002Ftitle><style>body{font-family:Arial,sans-serif;padding:16px;}table{width:100%;border-collapse:collapse;font-size:12px;} th,td{border:1px solid #ccc;padding:5px;text-align:left;vertical-align:top;} th{background:#eee;}<\u002Fstyle><\u002Fhead><body>\"+body+\"<\u002Fbody><\u002Fhtml>\");\n    win.document.close();\n    win.focus();\n    win.print();\n    win.close();\n  }\n  async copyTable() {\n    const tickets = this.state.tickets;\n    if (!tickets.length) { alert(\"Nenhum mini-ticket para copiar.\"); return; }\n    let text = [\"Identidade\",\"Guia\",\"Beneficiário\",\"Remessa\",\"Situação da Guia\",\"Detalhes\",\"Valor (R$)\",\"Status (após processamento)\"].join(\"\\t\") + \"\\n\";\n    tickets.forEach(t => { text += [this.getGenderEmoji(t.sexo), t.guia||\"\", t.beneficiario||\"\", t.remessa||\"\", t.situacaoGuia||\"\", this.ticketDetailStr(t,\" | \"), t.total.toFixed(2), t.status||\"\"].join(\"\\t\") + \"\\n\"; });\n    const tot = tickets.reduce((a, t) => a + t.total, 0);\n    text += [\"\",\"TOTAL\",\"\",\"\",\"\",\"\",tot.toFixed(2),\"\"].join(\"\\t\") + \"\\n\";\n    let ok = false;\n    try {\n      if (navigator.clipboard && window.isSecureContext) { await navigator.clipboard.writeText(text); ok = true; }\n    } catch (e) { ok = false; }\n    if (!ok) {\n      try {\n        const ta = document.createElement(\"textarea\");\n        ta.value = text; ta.style.cssText = \"position:fixed;top:-2000px;left:0;opacity:0;\";\n        document.body.appendChild(ta); ta.focus(); ta.select();\n        ok = document.execCommand(\"copy\");\n        document.body.removeChild(ta);\n      } catch (e) { ok = false; }\n    }\n    alert(ok ? \"Tabela copiada para a área de transferência!\" : \"Não foi possível copiar automaticamente.\");\n  }\n  exportJson() {\n    if (!this.state.tickets.length) { alert(\"Nenhum mini-ticket para exportar.\"); return; }\n    this.download(\"mini_tickets.json\", JSON.stringify({ tickets: this.state.tickets }, null, 2), \"application/json;charset=utf-8;\");\n  }\n  triggerImport() { if (this.importRef.current) this.importRef.current.click(); }\n  onImportFile(e) {\n    const file = e.target.files[0]; if (!file) return;\n    const reader = new FileReader();\n    reader.onload = (ev) => {\n      try {\n        const obj = JSON.parse(ev.target.result);\n        if (obj && Array.isArray(obj.tickets)) {\n          this.persist({ tickets: obj.tickets });\n          this.setState({ tickets: obj.tickets, summary: null });\n          this.recalcDisplay(obj.tickets);\n        } else alert(\"JSON não contém a estrutura esperada.\");\n      } catch (err) { alert(\"Erro ao ler o JSON.\"); }\n      e.target.value = \"\";\n    };\n    reader.readAsText(file);\n  }\n  downloadSummary() {\n    const tickets = this.state.tickets;\n    const totals = { pago: 0, emAuditoria: 0, cancelada: 0, outros: 0, total: 0 };\n    tickets.forEach(t => {\n      totals.total += t.total;\n      const st = (t.status || \"\").toLowerCase();\n      if (st.includes(\"pago\")) totals.pago += t.total;\n      else if (st.includes(\"auditoria\")) totals.emAuditoria += t.total;\n      else if ((t.situacaoGuia || \"\").toLowerCase().includes(\"cancelada\")) totals.cancelada += t.total;\n      else if (st) totals.outros += t.total;\n    });\n    const now = new Date();\n    let c = \"Data: \" + now.toLocaleDateString(\"pt-BR\") + \"\\n\\nResumo:\\n\";\n    c += \"Total geral: R$ \" + totals.total.toFixed(2) + \"\\n\";\n    c += \"Pago: R$ \" + totals.pago.toFixed(2) + \"\\n\";\n    c += \"Em auditoria: R$ \" + totals.emAuditoria.toFixed(2) + \"\\n\";\n    c += \"Cancelada: R$ \" + totals.cancelada.toFixed(2) + \"\\n\";\n    c += \"Outros: R$ \" + totals.outros.toFixed(2) + \"\\n\\nMini-tickets:\\n\";\n    tickets.forEach(t => { c += t.guia + \"; \" + t.beneficiario + \"; \" + t.remessa + \"; \" + t.situacaoGuia + \"; \" + t.total.toFixed(2) + \"; \" + t.status + \"\\n\"; });\n    this.download(\"resumo_\" + now.toISOString().split(\"T\")[0] + \".txt\", c, \"text/plain;charset=utf-8\");\n  }\n\n  getGenderEmoji(sexo) {\n    if (!sexo) return \"👤\";\n    const s = sexo.toString().trim().toLowerCase();\n    if (/^m\\b/.test(s) || /^masc/.test(s) || /^hom/.test(s)) return \"👨\";\n    if (/^f\\b/.test(s) || /^fem/.test(s) || /^mul/.test(s)) return \"👩\";\n    return \"👤\";\n  }\n\n  // ---------- view ----------\n  fmt(n) { return \"R$ \" + (n || 0).toFixed(2); }\n\n  renderVals() {\n    const tickets = this.state.tickets;\n    const total = tickets.reduce((a, t) => a + (t.total || 0), 0);\n\n    const co = this.consultationOptions();\n    const coOptions = Object.keys(co).map(k => ({ value: k, label: k }));\n    const procedures = this.state.procedures.map((p, idx) => ({\n      label: p.desc + \" (Qtd: \" + p.qty + \")\",\n      isConsulta: !!p.isConsulta,\n      isExame: !p.isConsulta,\n      selected: p.selected,\n      options: coOptions,\n      valueFmt: \"→ \" + this.fmt(this.getExamValue(p.desc)),\n      onSelect: (e) => this.setProcSel(idx, e.target.value)\n    }));\n\n    const m = this.state.metadata || {};\n    const metaLines = [];\n    if (m.beneficiario) metaLines.push(\"Nome: \" + m.beneficiario);\n    if (m.guiaSiass) metaLines.push(\"Guia SIASS: \" + m.guiaSiass);\n    if (m.dataEmissao) metaLines.push(\"Data de emissão: \" + m.dataEmissao);\n\n    const ticketViews = tickets.map((t, idx) => {\n      const st = (t.status || \"\").toLowerCase();\n      let rowBg = \"transparent\";\n      if (st.includes(\"pago\")) rowBg = \"#d7f0d0\";\n      else if (st.includes(\"auditoria\")) rowBg = \"#fbf3c4\";\n      else if ((t.situacaoGuia || \"\").toLowerCase().includes(\"cancelada\")) rowBg = \"#f6cbcb\";\n      else if (st) rowBg = \"#cfe3f7\";\n      const detailLines = [];\n      if (t.numeroGuiaPrestador) detailLines.push({ label: \"Nº Guia do Prestador:\", value: t.numeroGuiaPrestador });\n      if (t.registroAns) detailLines.push({ label: \"Registro ANS:\", value: t.registroAns });\n      if (t.dataEmissao) detailLines.push({ label: \"Data Emissão:\", value: t.dataEmissao });\n      if (t.guiaSiass) detailLines.push({ label: \"Guia SIASS:\", value: t.guiaSiass });\n      if (t.lote) detailLines.push({ label: \"Lote:\", value: t.lote });\n      if (t.documento) detailLines.push({ label: \"Documento:\", value: t.documento });\n      if (t.sexo) detailLines.push({ label: \"Sexo:\", value: t.sexo });\n      if (t.dataNascimento) detailLines.push({ label: \"Data Nasc.:\", value: t.dataNascimento });\n      if (t.cpf) detailLines.push({ label: \"CPF:\", value: t.cpf });\n      if (t.rg) detailLines.push({ label: \"RG:\", value: t.rg });\n      const procLines = (Array.isArray(t.procedures) ? t.procedures : []).map(p => {\n        const pp = [];\n        if (p.item) pp.push(\"Item \" + p.item);\n        if (p.code) pp.push(\"Código: \" + p.code);\n        if (p.cbo) pp.push(\"CBO: \" + p.cbo);\n        if (p.dateAtendimento) pp.push(\"Data: \" + p.dateAtendimento);\n        if (p.desc) pp.push(\"Desc: \" + p.desc);\n        if (p.qty !== undefined) pp.push(\"Qtd: \" + p.qty);\n        return pp.join(\", \");\n      });\n      return {\n        guia: t.guia, beneficiario: t.beneficiario, remessa: t.remessa,\n        situacaoGuia: t.situacaoGuia, status: t.status || \"\",\n        genderEmoji: this.getGenderEmoji(t.sexo),\n        valorFmt: t.total.toFixed(2), rowBg, detailLines,\n        procLines, hasProcs: procLines.length > 0,\n        edit: () => this.editTicket(idx),\n        del: () => this.deleteTicket(idx)\n      };\n    });\n\n    const valueRows = [];\n    Object.keys(this.state.geap).sort().forEach(n => valueRows.push({ nome: n, fonte: \"GEAP\", valorFmt: this.fmt(this.state.geap[n]), remove: () => this.removeExame(n, \"GEAP\") }));\n    Object.keys(this.state.cnem).sort().forEach(n => valueRows.push({ nome: n, fonte: \"CNEM\", valorFmt: this.fmt(this.state.cnem[n]), remove: () => this.removeExame(n, \"CNEM\") }));\n\n    const s = this.state.summary;\n    const summaryLines = s ? [\n      \"Total geral: \" + this.fmt(s.total),\n      \"Pago: \" + this.fmt(s.pago),\n      \"Em auditoria: \" + this.fmt(s.emAuditoria),\n      \"Cancelada: \" + this.fmt(s.cancelada),\n      \"Outros: \" + this.fmt(s.outros)\n    ] : [];\n\n    const tapeRows = tickets.map((t, i) => {\n      const nm = (t.beneficiario || \"SEM NOME\").split(/\\s+/).slice(0, 2).join(\" \");\n      return { label: String(i + 1).padStart(2, \"0\") + \" \" + nm, valueFmt: (t.total || 0).toFixed(2).replace(\".\", \",\") };\n    });\n    const dispTotalFmt = \"R$ \" + (this.state.animTotal || 0).toFixed(2).replace(\".\", \",\");\n\n    return {\n      ticketCount: tickets.length,\n      totalDisplay: this.fmt(total),\n      tapeRows,\n      dispTotalFmt,\n      openGuide: () => this.setState({ modal: \"guide\" }),\n      openTickets: () => this.setState({ modal: \"tickets\" }),\n      openProcess: () => this.setState({ modal: \"process\" }),\n      openValues: () => this.setState({ modal: \"values\" }),\n      openExport: () => this.setState({ modal: \"export\" }),\n      close: () => this.setState({ modal: null }),\n      stop: (e) => e.stopPropagation(),\n      mGuide: this.state.modal === \"guide\",\n      mTickets: this.state.modal === \"tickets\",\n      mProcess: this.state.modal === \"process\",\n      mValues: this.state.modal === \"values\",\n      mExport: this.state.modal === \"export\",\n      guideRef: this.guideRef, processRef: this.processRef, remessaRef: this.remessaRef,\n      nomeRef: this.nomeRef, valorRef: this.valorRef, fonteRef: this.fonteRef, importRef: this.importRef,\n      analyze: () => this.analyze(),\n      hasProcedures: this.state.hasProcedures,\n      procedures, metaLines,\n      addTicket: () => this.addTicket(),\n      ticketViews, hasTickets: tickets.length > 0, noTickets: tickets.length === 0,\n      applyRemessa: () => this.applyRemessa(),\n      resetTickets: () => this.resetTickets(),\n      processSummary: () => this.processSummary(),\n      hasSummary: !!s, summaryLines,\n      valueRows,\n      addExame: () => this.addExame(),\n      exportCsv: () => this.exportCsv(),\n      exportPdf: () => this.exportPdf(),\n      copyTable: () => this.copyTable(),\n      exportJson: () => this.exportJson(),\n      triggerImport: () => this.triggerImport(),\n      onImportFile: (e) => this.onImportFile(e),\n      downloadSummary: () => this.downloadSummary()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
